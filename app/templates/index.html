<!DOCTYPE html>
<html lang="en">

<head>
  <title>Advanced LinkedIn Job Search Engine</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-select@1.13.14/dist/css/bootstrap-select.min.css">
</head>

<body>

  <div class="container my-3">
    <h1>Advanced LinkedIn Job Search Engine</h1>
    <form
      class="mb-3"
      id="search-form">
      <div class="mb-3">
        <label
          for="jobs-search-box-keyword-id"
          class="form-label">
          <span class="visually-hidden">
            Search by title, skill, or company
          </span>
        </label>
        <input
          type="text"
          name="keywords"
          class="form-control"
          id="jobs-search-box-keyword-id"
          placeholder="Title, skill or company"
          value="{{ request.args.get('keywords', '') }}">
      </div>
      <div class="mb-3">
        <label
          for="jobs-search-box-location-id"
          class="form-label">
          <span class="visually-hidden">
            City, state, or zip code
          </span>
        </label>
        <input
          type="text"
          name="location"
          class="form-control"
          id="jobs-search-box-location-id"
          placeholder="City, state, or zip code"
          value="{{ request.args.get('location', '') }}">
      </div>
      <div class="mb-3">
        <label
          for="jobs-search-box-number-id"
          class="form-label">
          <span class="visually-hidden">
            Number of searches
          </span>
        </label>
        <input
          type="number"
          name="number"
          class="form-control"
          id="jobs-search-box-number-id"
          aria-describedby="numberHelp"
          placeholder="Number of searches"
          value="{{ request.args.get('number', '25') }}"
          min="1">
        <div
          id="numberHelp"
          class="form-text">
          More time is needed to get and analyze more searches.
        </div>
      </div>
      <button
        type="submit"
        class="btn btn-primary">
        Search
      </button>
    </form>
    <div
      class="mb-3"
      id="output-div">
    </div>
    <footer class="mb-3 border-top">
      <p class="mb-3 text-center text-body-secondary">
        Made with &#10084; by JY<br>Most importantly, keep learning =)
      </p>
    </footer>
  </div>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap-select@1.13.14/dist/js/bootstrap-select.min.js"></script>
  <script type="module" src="static/script.js"></script>

</body>

</html>
